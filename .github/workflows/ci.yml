name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm --workspace apps/api exec prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  deploy-web:
    name: Deploy web
    runs-on: ubuntu-latest
    needs: ci
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel
        id: vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd apps/web
          npx vercel --prod --token "$VERCEL_TOKEN" --yes 2>&1 | tee /tmp/vercel-output.txt
          echo "url=$(grep -oE 'https://[^ ]+\.vercel\.app' /tmp/vercel-output.txt | tail -1)" >> "$GITHUB_OUTPUT"

      - name: Comment deployment URL on commit
        if: steps.vercel.outputs.url != ''
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.vercel.outputs.url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployUrl = process.env.DEPLOY_URL || '';
            if (!deployUrl.startsWith('http')) return;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `Web deployed to ${deployUrl}`
            });

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: ci
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --detach

      - name: Healthcheck API
        run: curl --retry 5 --retry-delay 5 --fail https://api.rally.app/health
